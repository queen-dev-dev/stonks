<!DOCTYPE html>
<html>

<head>
    <title>
        stocks portfolio
    </title>
</head>

<body>
    <h1>STOCK PORTFOLIO!!!</h1>
    <hr>
    <p>
        See below for stonks
    </p>
    <div class="dropdown">
        <button class="dropbtn">Dropdown</button>
        <div class="dropdown-content">
            <a id="CAT">CAT</a>
            <a id="DD">DD</a>
            <a id="EK">EK</a>
            <a id="GM">GM</a>
        </div>
    </div>
</body>
<style>
    body {
        background-color: #1e3d1e;
        color: #00d9ff;
    }

    /* Dropdown Button */
    .dropbtn {
        background-color: #1e3d1e;
        color: #00d9ff;
        padding: 16px;
        font-size: 16px;
        border: none;
    }

    /* The container <div> - needed to position the dropdown content */
    .dropdown {
        position: relative;
        display: inline-block;
    }

    /* Dropdown Content (Hidden by Default) */
    .dropdown-content {
        display: none;
        position: absolute;
        color: #00d9ff;
        background-color: #af0000;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
        z-index: 1;
    }

    /* Links inside the dropdown */
    .dropdown-content a {
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
    }

    /* Change color of dropdown links on hover */
    .dropdown-content a:hover {
        background-color: #ddd;
    }

    /* Show the dropdown menu on hover */
    .dropdown:hover .dropdown-content {
        display: block;
    }

    /* Change the background color of the dropdown button when the dropdown content is shown */
    .dropdown:hover .dropbtn {
        background-color: #3e8e41;
    }
</style>
<script>
    const portfolio = [["23-Aug-2018", 43.50, 25, 'CAT', 92.45],
    ["15-Mar-2016", 42.80, 50, 'DD', 51.19],
    ["7-Dec-2017", 42.10, 75, 'EK', 34.87],
    ["6-Dec-2016", 37.58, 100, 'GM', 37.58]];
    for (let i = 0; i < portfolio.length; i++) {
        let portfolioDetails = portfolio[i]
        let newP = document.createElement("p")
        let appendList = ["Stock name: ", "Date bought: ", "Shares: ", "Purchase Price: ", "Current Price: "];
        appendList[0] += portfolioDetails[3] + ", ";
        appendList[1] += portfolioDetails[0] + ", ";
        appendList[2] += portfolioDetails[2] + ", ";
        appendList[3] += portfolioDetails[1] + ", ";
        appendList[4] += portfolioDetails[4];
        let newpara = document.createElement("p")
        for (let j = 0; j < portfolio.length; j++) {
            let txtNod = document.createTextNode(appendList[j])
            newpara.appendChild(txtNod);
        }
        document.body.appendChild(newpara)
    }

    const form = document.getElementById("stockType")
    form.addEventListener("submit", function (a, b, c, d) {

    })
</script>

</html>
